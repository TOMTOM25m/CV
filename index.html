<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CV Portfolio - Thomas Garnreiter</title>
  <style>
    :root { --ink:#101828; --muted:#475467; --line:#d0d5dd; --paper:#f8fafc; --card:#ffffff; --brand:#0b3a6e; --accent:#0f766e; }
    * { box-sizing:border-box; }
    body { margin:0; color:var(--ink); background:linear-gradient(145deg,#f0f4f8 0%,#e7eef6 100%); font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif; line-height:1.45; padding:24px; }
    .sheet { max-width:800px; margin:0 auto; background:var(--paper); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:0 14px 40px rgba(16,24,40,0.12); }
    header { background:linear-gradient(130deg,var(--brand),#0a2b4d 68%); color:#fff; padding:32px; text-align:center; }
    h1 { margin:0; font-size:32px; }
    .headline { margin:8px 0 0; font-size:16px; opacity: 0.9; }
    main { padding:32px; }
    .cv-list { display: flex; flex-direction: column; gap: 16px; }
    .cv-card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; display:flex; justify-content:space-between; align-items:center; transition: transform 0.2s, box-shadow 0.2s;}
    .cv-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); border-color: var(--brand); }
    .cv-info h3 { margin:0 0 4px; font-size:18px; color:var(--brand); }
    .cv-info p { margin:0; font-size:14px; color:var(--muted); }
    .cv-actions { display: flex; gap: 12px; }
    .btn { text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; transition: background 0.2s; }
    .btn-view { background: #e0e7ff; color: #3730a3; }
    .btn-view:hover { background: #c7d2fe; }
    .btn-pdf { background: #dcfce7; color: #166534; }
    .btn-pdf:hover { background: #bbf7d0; }
  </style>
</head>
<body>
  <div class="sheet">
    <header>
      <h1>CV Portfolio</h1>
      <p class="headline">Thomas Garnreiter (Flecki)</p>
    </header>
    <main>
      <div class="cv-list">
        
        <div class="cv-card">
          <div class="cv-info">
            <h3>CV 04.07.2026 10:01</h3>
            <p>Generated: 2026-07-04 10:01:46</p>
          </div>
          <div class="cv-actions">
            <a href="html/cv-generated-20260704-100146-AT_S_Austria_Technologie_Systemtechnik_AG.html" class="btn btn-view" target="_blank">View HTML</a>
            <a href="pdf/cv-generated-20260704-100146-AT_S_Austria_Technologie_Systemtechnik_AG.pdf" class="btn btn-pdf" target="_blank">Download PDF</a>
          </div>
        </div>

        <div class="cv-card">
          <div class="cv-info">
            <h3>CV 24.05.2026 13:05</h3>
            <p>Generated: 2026-05-24 13:05:40</p>
          </div>
          <div class="cv-actions">
            <a href="html/cv-generated-20260524-130540.html" class="btn btn-view" target="_blank">View HTML</a>
            <a href="pdf/cv-generated-20260524-130540.pdf" class="btn btn-pdf" target="_blank">Download PDF</a>
          </div>
        </div>

      </div>
    </main>
  </div>
</body>
</html>
